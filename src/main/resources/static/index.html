<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Header -->
<header class="header">
    <div class="header-content">
        <h1 class="app-title">Task Tracker</h1>
        <div class="header-stats">
            <span class="task-count" id="taskCount">0 tasks</span>
            <button class="btn btn-primary create-btn" id="createTaskBtn" aria-label="Create new task">
                + Create Task
            </button>
        </div>
    </div>
</header>

<!-- Main Content -->
<main class="main-content">
    <!-- Loading State -->
    <div class="loading-state" id="loadingState" aria-label="Loading tasks">
        <div class="spinner"></div>
        <p>Loading tasks...</p>
    </div>

    <!-- Error State -->
    <div class="error-state hidden" id="errorState">
        <div class="error-icon">!</div>
        <h2>Oops! Something went wrong</h2>
        <p id="errorMessage">Unable to load tasks</p>
        <button class="btn btn-secondary" id="retryBtn">Try Again</button>
    </div>

    <!-- Empty State -->
    <div class="empty-state hidden" id="emptyState">
        <div class="empty-icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="9" y1="9" x2="15" y2="15"></line>
                <line x1="15" y1="9" x2="9" y2="15"></line>
            </svg>
        </div>
        <h2>No tasks yet</h2>
        <p>Get started by creating your first task!</p>
        <button class="btn btn-primary" id="emptyCreateBtn">Create Task</button>
    </div>

    <!-- Task Grid -->
    <div class="task-grid hidden" id="taskGrid" role="list" aria-label="Task list">
        <!-- Tasks will be rendered here -->
    </div>
</main>

<!-- Task Modal (Create/Edit) -->
<div class="modal-overlay hidden" id="taskModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
        <div class="modal-header">
            <h2 id="modalTitle">Create Task</h2>
            <button class="modal-close" id="modalCloseBtn" aria-label="Close modal">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <form id="taskForm" class="modal-body">
            <input type="hidden" id="taskId" name="id">

            <div class="form-group">
                <label for="title">Title *</label>
                <input
                        type="text"
                        id="title"
                        name="title"
                        required
                        placeholder="Enter task title"
                        maxlength="100"
                        aria-describedby="titleError"
                >
                <span class="error-text" id="titleError"></span>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea
                        id="description"
                        name="description"
                        placeholder="Enter task description (optional)"
                        rows="3"
                        maxlength="500"
                ></textarea>
            </div>

            <div class="form-group">
                <label for="dueDate">Due Date</label>
                <input
                        type="date"
                        id="dueDate"
                        name="dueDate"
                >
            </div>

            <div class="form-group">
                <label for="priority">Priority</label>
                <select id="priority" name="priority">
                    <option value="LOW">LOW</option>
                    <option value="MEDIUM" selected>MEDIUM</option>
                    <option value="HIGH">HIGH</option>
                </select>
            </div>

            <div class="form-group hidden" id="statusGroup">
                <label for="status">Status</label>
                <select id="status" name="status">
                    <option value="OPEN">OPEN</option>
                    <option value="COMPLETE">COMPLETE</option>
                    <option value="ARCHIVE">ARCHIVE</option>
                </select>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span class="btn-text">Create Task</span>
                    <div class="btn-spinner hidden"></div>
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal-overlay hidden" id="deleteModal" role="alertdialog" aria-modal="true" aria-labelledby="deleteTitle" aria-describedby="deleteDesc">
    <div class="modal confirmation-modal">
        <div class="modal-header">
            <h2 id="deleteTitle">Delete Task</h2>
        </div>
        <div class="modal-body">
            <div class="warning-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
            </div>
            <p id="deleteDesc">Are you sure you want to delete this task? This action cannot be undone.</p>
            <p class="task-to-delete" id="taskToDelete"></p>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="deleteCancelBtn">Cancel</button>
            <button type="button" class="btn btn-danger" id="deleteConfirmBtn">
                <span class="btn-text">Delete</span>
                <div class="btn-spinner hidden"></div>
            </button>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true">
    <!-- Toasts will be rendered here -->
</div>

<script type="text/javascript" src="main.js"></script>
</body>
</html>
